<mat-toolbar color="primary">
  <span>Analytics Dashboard</span>
</mat-toolbar>

<div class="container">
  <!-- Loading -->
  <div *ngIf="loading">
    <p>Carregando informações...</p>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
  </div>

  <!-- Tabela -->
  <table mat-table [dataSource]="analytics" *ngIf="!loading">
    If="!loading && analytics.length > 0" >
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let item">
        {{ item.id }}
      </td>
    </ng-container>

    <!-- Route -->
    <ng-container matColumnDef="route">
      <th mat-header-cell *matHeaderCellDef>Route</th>
      <td mat-cell *matCellDef="let item">
        {{ item.route }}
      </td>
    </ng-container>

    <!-- Session -->
    <ng-container matColumnDef="sessionId">
      <th mat-header-cell *matHeaderCellDef>Session</th>
      <td mat-cell *matCellDef="let item">
        {{ item.sessionId }}
      </td>
    </ng-container>

    <!-- Timestamp -->
    <ng-container matColumnDef="timestamp">
      <th mat-header-cell *matHeaderCellDef>Data</th>
      <td mat-cell *matCellDef="let item">
        {{ item.timestamp | date: 'dd/MM/yyyy HH:mm:ss' }}
      </td>
    </ng-container>

    <!-- User Agent -->
    <ng-container matColumnDef="user_agent">
      <th mat-header-cell *matHeaderCellDef>User Agent</th>
      <td mat-cell *matCellDef="let item">
        {{ item.user_agent }}
      </td>
    </ng-container>

    <!-- Headers -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- Rows -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
